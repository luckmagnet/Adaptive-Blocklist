name: Convert Hosts to Adblock

on:
  push:
    paths:
      - '**/conversion.yaml'
      - '**/convert_hosts_to_adblock.py'
      - '**/hosts'
      - '**/hosts.txt'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run converter (debug)
        shell: bash
        run: |
          set -euo pipefail
          # choose hosts file
          if [ -f hosts.txt ]; then
            HOSTS_FILE=hosts.txt
          elif [ -f hosts ]; then
            HOSTS_FILE=hosts
          else
            echo "ERROR: hosts file not found (checked hosts.txt and hosts)" >&2
            exit 2
          fi
          CFG_FILE=conversion.yaml
          if [ ! -f "$CFG_FILE" ]; then
            echo "ERROR: conversion.yaml not found" >&2
            exit 2
          fi
          echo "Using HOSTS_FILE=$HOSTS_FILE CFG_FILE=$CFG_FILE"
          # capture stdout/stderr for diagnosis
          python -u convert_hosts_to_adblock.py "$HOSTS_FILE" "$CFG_FILE" > adblock.txt 2> converter.err || true
          PY_EXIT=$?
          echo "Python exit code: $PY_EXIT"
          echo "---- converter.stderr ----"
          sed -n '1,200p' converter.err || true
          echo "---- adblock.txt (first 200 lines) ----"
          sed -n '1,200p' adblock.txt || true
          if [ $PY_EXIT -ne 0 ]; then
            echo "Converter failed with exit code $PY_EXIT" >&2
            exit $PY_EXIT
          fi

      - name: Upload adblock as artifact
        uses: actions/upload-artifact@v4
        with:
          name: adblock-list
          path: adblock.txt
