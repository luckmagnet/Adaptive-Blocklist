name: Convert Hosts to Adblock

on:
  push:
    paths:
      - '**/conversion.yaml'
      - '**/convert_hosts_to_adblock.py'
      - '**/hosts'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: python -m pip install pyyaml
      - name: Run converter
        run: python convert_hosts_to_adblock.py hosts conversion.yaml > adblock.txt
      - name: Show output (first 50 lines)
        run: head -n 50 adblock.txt
