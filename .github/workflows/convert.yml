name: Convert Hosts to AdBlock

on:
  push:
    paths:
      - 'hosts.txt'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process File
        run: |
          # 1. Check if hosts.txt exists to avoid "red line" errors
          if [ ! -f hosts.txt ]; then
            echo "Error: hosts.txt not found in the root directory!"
            exit 1
          fi

          # 2. Start building the new file
          echo "! Title: My Custom AdBlock List" > adblock.txt
          echo "! Last Updated: $(date -u)" >> adblock.txt
          echo "! Total Entries: $(wc -l < hosts.txt)" >> adblock.txt
          echo "!" >> adblock.txt
          
          # 3. The Logic:
          # - grep: Only looks for lines starting with 0.0.0.0 or 127.0.0.1
          # - sed: Cleans up any weird carriage returns (\r) from Windows
          # - awk: Formats the domain into ||domain.com^
          grep -E '^(0\.0\.0\.0|127\.0\.0\.1)' hosts.txt | sed 's/\r//' | awk '{print "||" $2 "^"}' >> adblock.txt

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add adblock.txt
          # Only commit if the file actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update adblock.txt" && git push)
